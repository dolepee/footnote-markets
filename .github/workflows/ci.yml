name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - run: npm ci

      - name: Install Foundry dependencies
        run: rm -rf contracts/lib/forge-std && git clone --depth 1 https://github.com/foundry-rs/forge-std contracts/lib/forge-std

      - name: Check JavaScript syntax
        run: find scripts web -type f \( -name "*.js" -o -name "*.mjs" \) -print0 | xargs -0 -n1 node --check

      - name: Build static web
        run: npm --prefix web run build

      - name: Test contracts
        run: npm run contracts:test

      - name: Build contracts
        run: npm run contracts:build
